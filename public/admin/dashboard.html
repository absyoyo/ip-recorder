<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Analytics - 后台</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f172a;
        --bg-card: #1e293b;
        --card-border: rgba(255,255,255,0.08);
        --text-main: #f1f5f9;
        --text-secondary: #94a3b8;
        --accent-color: #60a5fa;
        --accent-green: #10b981;
        --accent-red: #f87171;
      }

      body {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text-main);
        min-height: 100vh;
        font-size: 0.9rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto auto;
        gap: 1rem;
      }

      header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0 1rem;
        border-bottom: 1px solid var(--card-border);
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--accent-color);
        letter-spacing: 0.05em;
      }

      .stats-summary {
        display: flex;
        gap: 1.5rem;
        align-items: center;
      }

      .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
      }

      .stat-value {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-main);
      }

      .stat-label {
        font-size: 0.7rem;
        color: var(--text-secondary);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 1.25rem;
      }

      .card-today { grid-column: 1; }
      .card-total { grid-column: 2; }
      .card-geo   { grid-column: 1 / -1; }
      .card-logs  { grid-column: 1 / -1; }

      .card-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 1rem;
      }

      .big-number {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1;
        margin-bottom: 0.25rem;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        gap: 1rem;
      }

      select {
        background: var(--bg);
        border: 1px solid var(--card-border);
        color: var(--text-main);
        padding: 0.35rem 0.7rem;
        border-radius: 6px;
        font-size: 0.8rem;
        cursor: pointer;
        outline: none;
      }

      select:focus { border-color: var(--accent-color); }

      .table-container {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }

      thead th {
        text-align: left;
        padding: 0.6rem 0.75rem;
        color: var(--text-secondary);
        font-weight: 600;
        border-bottom: 1px solid var(--card-border);
        white-space: nowrap;
      }

      tbody td {
        padding: 0.6rem 0.75rem;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        vertical-align: top;
      }

      tbody tr:last-child td { border-bottom: none; }

      tbody tr.log-row:hover td { background: rgba(255,255,255,0.03); }

      code {
        font-family: "Courier New", monospace;
        font-size: 0.82rem;
      }

      .tag {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        background: rgba(255,255,255,0.08);
        color: var(--text-secondary);
        white-space: nowrap;
      }

      .pagination {
        display: flex;
        gap: 0.4rem;
        justify-content: center;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .page-btn {
        background: var(--bg);
        border: 1px solid var(--card-border);
        color: var(--text-main);
        padding: 0.3rem 0.65rem;
        border-radius: 5px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .page-btn:hover:not(:disabled):not(.active) {
        background: rgba(255,255,255,0.08);
        border-color: var(--accent-color);
      }

      .page-btn.active {
        background: var(--accent-color);
        border-color: var(--accent-color);
        color: #fff;
        cursor: default;
      }

      .page-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .logout-btn {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: var(--text-secondary);
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: border-color 0.15s, color 0.15s;
      }

      .logout-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .date-range {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      input[type="datetime-local"] {
        background: var(--bg);
        border: 1px solid var(--card-border);
        color: var(--text-main);
        padding: 0.35rem 0.6rem;
        border-radius: 6px;
        font-size: 0.8rem;
        outline: none;
        color-scheme: dark;
      }

      input[type="datetime-local"]:focus { border-color: var(--accent-color); }

      .apply-btn {
        background: var(--accent-color);
        border: none;
        color: #fff;
        padding: 0.35rem 0.8rem;
        border-radius: 6px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .apply-btn:hover { opacity: 0.85; }

      @media (max-width: 640px) {
        .container {
          grid-template-columns: 1fr;
          padding: 1rem 0.75rem;
          gap: 0.75rem;
        }
        .card-today, .card-total, .card-geo, .card-logs { grid-column: 1; }

        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.75rem;
        }

        .stats-summary { gap: 1rem; }

        .big-number { font-size: 2rem; }

        .controls {
          flex-direction: column;
          align-items: flex-start;
        }

        select { width: 100%; }

        thead { display: none; }

        tbody tr.log-row {
          display: block;
          border: 1px solid var(--card-border);
          border-radius: 8px;
          margin-bottom: 0.75rem;
          padding: 0.75rem;
        }

        tbody tr.log-row td {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          padding: 0.3rem 0;
          border-bottom: 1px solid rgba(255,255,255,0.04);
          font-size: 0.8rem;
          gap: 0.5rem;
        }

        tbody tr.log-row td:last-child { border-bottom: none; }

        tbody tr.log-row td::before {
          content: attr(data-label);
          color: var(--text-secondary);
          font-size: 0.72rem;
          white-space: nowrap;
          flex-shrink: 0;
          padding-top: 0.1rem;
        }

        tbody tr.ua-detail td {
          display: block;
          padding: 0.75rem;
        }
      }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IP Analytics</h1>
            <div class="stats-summary">
                <div class="stat-item">
                    <span class="stat-value" id="summary-online">--</span>
                    <span class="stat-label">正在运行</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="summary-last-update">--</span>
                    <span class="stat-label">最后更新</span>
                </div>
                <div class="stat-item" style="display:flex;align-items:center;">
                    <button class="logout-btn" id="logout-btn">退出</button>
                </div>
            </div>
        </header>

        <section class="card card-today">
            <div class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                今日访问
            </div>
            <div class="big-number" id="today-count">0</div>
            <div class="stat-label">次请求</div>
        </section>

        <section class="card card-total">
            <div class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                累计访问
            </div>
            <div class="big-number" id="total-count">0</div>
            <div class="stat-label">历史总计</div>
        </section>

        <section class="card card-geo">
            <div class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                地区分布
            </div>
            <div id="geo-list">
                <div style="color: var(--text-secondary); padding: 1rem 0;">等待数据加载...</div>
            </div>
        </section>

        <section class="card card-logs">
            <div class="controls">
                <div class="card-title" style="margin-bottom: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    访问日志
                </div>
                <div class="filter-group">
                    <select id="time-filter">
                        <option value="all">全部时间</option>
                        <option value="today">今天</option>
                        <option value="yesterday">昨天</option>
                        <option value="7days">最近 7 天</option>
                        <option value="30days">最近 30 天</option>
                        <option value="custom">自定义范围</option>
                    </select>
                    <div class="date-range" id="date-range" style="display:none;">
                        <input type="datetime-local" id="date-start">
                        <span style="color: var(--text-secondary); font-size: 0.8rem;">至</span>
                        <input type="datetime-local" id="date-end">
                        <button class="apply-btn" id="apply-date">查询</button>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>访问 IP / 地区</th>
                            <th>WebRTC IP</th>
                            <th>状态</th>
                            <th>用户代理</th>
                        </tr>
                    </thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </section>
    </div>

    <script type="module" src="/js/app.js"></script>
    <script>
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        location.href = '/admin';
      });
    </script>
</body>
</html>
